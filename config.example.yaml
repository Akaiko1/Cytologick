# Cytologick example configuration
#
# Usage:
#   1) Copy this file to `config.yaml`
#   2) Edit paths for your machine
#
# Notes:
# - Do not commit real slide data or patient data.
# - `openslide-python` requires OpenSlide binaries installed on the system.

general:
  # A default slide name used by the GUI/demo flows.
  # Point this to a file that exists on your machine.
  current_slide: "example.mrxs"

  # Optional: path to an XML/annotation file for the current slide.
  current_slide_xml: "./current/example/annotations.xml"

  # Windows only: path to OpenSlide binaries (DLLs). On macOS/Linux keep empty.
  # openslide_path: "C:/openslide/bin"
  openslide_path: ""

  # Folder containing your MRXS slides
  hdd_slides: "/path/to/mrxs-slides"

  # Optional: folder containing SVS slides
  hdd_slides_svs: "/path/to/svs-slides"

  temp_folder: "temp"

neural_network:
  # Primary supported framework in this repo.
  framework: pytorch  # Options: 'tensorflow', 'pytorch'

  # Dataset layout used by training.
  dataset_folder: "dataset"
  masks_folder: "masks"
  images_folder: "rois"
  image_chunk: [256, 256]
  image_shape: [256, 256]
  classes: 3

  # PyTorch / segmentation-models-pytorch encoder config
  # Model architecture options:
  # - unetplusplus
  # - deeplabv3plus
  # - segformer
  pt_model_arch: segformer
  # Encoder backbone (depends on architecture):
  # - segformer: mit_b2 (recommended)
  # - deeplabv3plus: resnet50 or mit_b2
  # - unetplusplus: resnet34 or resnet50
  pt_encoder_name: "mit_b2"
  pt_encoder_weights: "imagenet"

  # Backwards-compatible default (resize + /255 scaling). Set true to use SMP
  # encoder-specific preprocessing (recommended with imagenet weights).
  pt_use_encoder_preprocessing: false

  # Training knobs (PyTorch)
  pt_optimizer: "adamw"
  # Scheduler modes:
  # - onecycle: per-batch OneCycleLR
  # - cawr: CosineAnnealingWarmRestarts
  # model_new.py default
  pt_scheduler_new: onecycle
  # model_train.py default (resume / finetune)
  pt_scheduler_finetune: cawr
  # Legacy fallback if mode-specific keys are absent
  pt_scheduler: onecycle
  pt_onecycle_pct_start: 0.1
  # Global LR fallback. Usually unused when pt_use_arch_lr_defaults=true.
  pt_lr: 1.0e-3
  # Use architecture-specific LR defaults.
  pt_use_arch_lr_defaults: true
  # Architecture LR defaults:
  # - unetplusplus: common Adam/AdamW start around 1e-3
  # - deeplabv3plus: official DeepLab code exposes adam_learning_rate=1e-3
  # - segformer: MMseg base is 6e-5 for bs=16; scaled x4 to ~2.4e-4 for bs=64
  pt_lr_unetplusplus: 1.0e-3
  pt_lr_deeplabv3plus: 1.0e-3
  pt_lr_segformer: 2.4e-4
  pt_weight_decay: 1.0e-4
  # For pretrained encoders, 0.1 is a common safe multiplier.
  # If training from scratch (pt_encoder_weights: null), consider 1.0.
  pt_encoder_lr_mult: 0.1
  pt_grad_clip_norm: 1.0
  # Segmentation loss:
  # - combined: Lovasz + CrossEntropy
  # - focal_tversky_ce: recall-biased Focal-Tversky + weighted CrossEntropy
  pt_loss: focal_tversky_ce
  pt_loss_ce_weight: 0.5
  pt_loss_tversky_weight: 1.0
  # Tversky params: beta > alpha penalizes FN stronger (better pathology recall).
  pt_tversky_alpha: 0.3
  pt_tversky_beta: 0.7
  pt_tversky_gamma: 1.33
  # Additional border/edge term in loss (0 disables).
  pt_boundary_loss_weight: 0.2
  pt_boundary_kernel_size: 3
  pt_boundary_ignore_background: true
  # Cross-entropy class weights [background, normal, pathology].
  pt_class_weights: [0.25, 1.0, 2.5]

  # Cross-entropy label smoothing (0..1). With mixup enabled, 0.0 is a good default.
  pt_label_smoothing: 0.0

  # Mixup alpha for Beta(alpha, alpha). 0 disables mixup.
  pt_mixup_alpha: 0.2
  # Train sampler:
  # - none: plain random shuffle
  # - pathology_balanced: weighted sampler targeting pathology-rich tiles
  pt_train_sampler: pathology_balanced
  pt_sampler_target_pathology_fraction: 0.5
  pt_sampler_pathology_min_pixels: 10
  pt_sampler_replacement: true
  # Stain-aware color strategy (HSV/HED + optional soft stain normalization).
  pt_stain_aware_aug: true
  pt_stain_hsv_prob: 0.35
  pt_stain_hed_prob: 0.25
  pt_stain_norm_prob: 0.20
  pt_stain_norm_blend_range: [0.15, 0.35]

  # Validation split
  # - 'cyclic' = rotating/rolling holdout (validation set changes every epoch)
  # - 'static' = a single random holdout split for all epochs
  pt_val_strategy: static
  # Fraction of samples used for validation (0..1). 0.2 -> 80/20.
  pt_val_fraction: 0.2
  # Seed for deterministic split permutation.
  pt_val_seed: 42

  # DataLoader multiprocessing
  # -1 = auto, 0 = single-process, >0 = worker processes
  pt_num_workers: -1
  # Save per-epoch checkpoints (*_epochNNN.pth). Disable to save disk space.
  pt_save_every_epoch: false
  # Best-checkpoint metric:
  # - mean_iou | mean_f1 | pathology_iou | pathology_f1 | pathology_pr_auc
  pt_checkpoint_metric: pathology_pr_auc
  # Class index treated as pathology/positive.
  pt_pathology_class_index: 2
  # Exclude background class (0) from mean IoU/F1 reporting.
  pt_include_background_metrics: false
  # Keep at least this fraction of pathology pixels after augmentation.
  pt_pathology_min_keep_ratio: 0.95
  # Strict pathology-safe augmentation mode:
  # true  -> no risky geometry/cutout for pathology tiles
  # false -> enables conservative risky geometry + small cutout
  pt_pathology_strict_aug: true
  # Max rotation (deg) for pathology-tiles conservative transform.
  pt_pathology_rotate_limit: 30

  # Label mapping used by the XML/annotation parsing pipeline.
  labels:
    LSIL: 2
    HSIL: 2
    "Group HSIL": 2
    ASCH: 2
    "Group atypical": 2
    ASCUS: 2
    Atypical: 2
    "Atypical naked": 2

gui:
  slide_dir: "./current"
  unet_pred_mode: "direct"  # Options: 'remote', 'smooth', 'direct'
  use_tta: false

dataset:
  exclude_duplicates: false
  broaden_individual_rect: 1000
  centered_crop: true
  tile_overlap: 0.25
  # Write per-rect debug overlays to debug_info/ (large output).
  debug: false
  # Pad each rect with a white border (pixels) before cropping.
  rect_border_padding: 25
  # Drop tiny pathology mask fragments (pixels) after rasterization.
  min_pathology_pixels: 10
  # If individual crop fails, force extraction by masking intruders.
  force_extraction: true
  # Centered-crop algorithm:
  # - heuristic: shift-based search (fast, may miss valid placements)
  # - ring: exhaustive edge-band search (slower, guarantees if exists)
  centered_crop_algo: heuristic
  # Pixels of edge margin to keep pathology away from tile borders.
  centered_crop_edge_margin: 3
  # Normal tiles limit in centered-crop mode:
  # - same: max(group+individual, 5)
  # - all: no limit (use all normal objects)
  # - multiplier: (group+individual) * normal_tiles_multiplier
  normal_tiles_limit: same
  normal_tiles_multiplier: 1.0

web:
  ip_exposed: "127.0.0.1"

  # Optional external endpoint (legacy / experimental). Leave empty if unused.
  endpoint_url: ""

  health_timeout: 1.5
  web_conf_threshold: 0.6
  fast_tiles: true
  tile_cache_size: 256
  atypical_class_index: 2
  scan_all_tissue: false
  progress_every: 25
  min_tissue_fraction: 0.05
  tissue_gray_threshold: 220

  # Local PyTorch batch size (0 = auto)
  pt_batch_size: 0
